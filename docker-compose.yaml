version: "3.8"
services:
    mysql:
        image: mariadb:10.8.3
        command: --default-authentication-plugin=mysql_native_password
        restart: always
        environment:
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3307:3306"
        volumes:
            - mysql_data:/var/lib/mysql
    adminer:
        image: adminer
        restart: always
        ports:
            - "8082:8080"
    mailer:
        image: axllent/mailpit
        ports:
            - "1025:1025"
            - "8025:8025"

volumes:
    mysql_data:
